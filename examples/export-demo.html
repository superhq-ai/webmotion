<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebMotion demo export harness</title>
    <style>
      body { font-family: ui-monospace, monospace; margin: 20px; }
      .holder { width: 640px; }
    </style>
  </head>
  <body>
    <div id="status">loading…</div>
    <div class="holder" id="holder"></div>
    <script type="module">
      // Export one demo by id (?demo=superhq&frames=120) and expose the mp4 as
      // base64 for automation, mirroring bench.js.
      import { demoById } from "./demos/index.js";

      const params = new URLSearchParams(location.search);
      if (params.has("debug")) window.__WM_LAYER_DEBUG = true;
      const id = params.get("demo") ?? "superhq";
      const maxFrames = Number(params.get("frames")) || 0;
      const status = document.getElementById("status");

      const demo = demoById.get(id);
      if (!demo) {
        status.textContent = "unknown demo: " + id;
      } else {
        const { element } = demo.create();
        if (maxFrames > 0) element.setAttribute("duration", String(maxFrames));
        document.getElementById("holder").appendChild(element);
        await element.ready;
        await Promise.all(
          Array.from(element.querySelectorAll("img")).map((img) =>
            img.decode ? img.decode().catch(() => {}) : Promise.resolve(),
          ),
        );
        status.textContent = "exporting " + id;
        const t0 = performance.now();
        try {
          const blob = await element.export({
            onProgress: ({ frame, total }) => {
              if (frame % 30 === 0) status.textContent = `exporting ${frame}/${total}`;
            },
          });
          const buf = new Uint8Array(await blob.arrayBuffer());
          let b64 = "";
          for (let i = 0; i < buf.length; i += 0x8000) {
            b64 += String.fromCharCode.apply(null, buf.subarray(i, i + 0x8000));
          }
          window.__MP4_B64 = btoa(b64);
          window.__EXPORT_MS = Math.round(performance.now() - t0);
          status.textContent = `done in ${window.__EXPORT_MS}ms`;
        } catch (e) {
          window.__EXPORT_ERROR = String((e && e.message) || e);
          status.textContent = "FAILED: " + window.__EXPORT_ERROR;
        }
      }
    </script>
  </body>
</html>
